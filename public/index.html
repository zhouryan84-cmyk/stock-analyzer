<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A股智能分析系统</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0e1a; }

    .app {
      min-height: 100vh;
      background: #0a0e1a;
      background-image:
        radial-gradient(ellipse at 15% 20%, rgba(220,38,38,0.07) 0%, transparent 50%),
        radial-gradient(ellipse at 85% 75%, rgba(99,102,241,0.06) 0%, transparent 50%);
      font-family: 'Noto Serif SC', serif;
      color: #e8e0d0;
      padding: 32px 20px 60px;
    }

    /* ── Header ── */
    .header { text-align: center; margin-bottom: 36px; }
    .logo-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: linear-gradient(135deg, #4f46e5, #6366f1);
      color: white; font-size: 11px; letter-spacing: 3px;
      padding: 5px 14px; border-radius: 2px; margin-bottom: 14px;
      font-family: 'JetBrains Mono', monospace;
    }
    .ds-dot { width:7px;height:7px;border-radius:50%;background:#a5b4fc;animation:pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.8)} }
    .title {
      font-size: clamp(24px, 4vw, 44px); font-weight: 700;
      background: linear-gradient(135deg, #f59e0b 0%, #fcd34d 50%, #f59e0b 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: 8px;
    }
    .subtitle { color: #6b7280; font-size: 13px; letter-spacing: 1px; font-family: 'JetBrains Mono', monospace; }
    .powered { display: block; margin-top: 5px; font-size: 11px; color: #374151; font-family: 'JetBrains Mono', monospace; }
    .powered span { color: #818cf8; }

    .main-card { max-width: 920px; margin: 0 auto; }

    /* ── API Key ── */
    .apikey-panel {
      background: rgba(99,102,241,0.04); border: 1px solid rgba(99,102,241,0.2);
      border-radius: 12px; padding: 18px 22px; margin-bottom: 18px;
    }
    .apikey-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .apikey-label { font-size: 11px; color: #818cf8; letter-spacing: 2px; font-family: 'JetBrains Mono', monospace; }
    .badge { font-size: 11px; font-family: 'JetBrains Mono', monospace; padding: 2px 10px; border-radius: 10px; }
    .badge-ok  { background: rgba(34,197,94,0.1); color: #4ade80; border: 1px solid rgba(34,197,94,0.2); }
    .badge-no  { background: rgba(220,38,38,0.1); color: #f87171; border: 1px solid rgba(220,38,38,0.2); }
    .row { display: flex; gap: 10px; }
    .key-input {
      flex:1; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px; padding: 10px 14px; color: #e8e0d0; font-size: 13px;
      font-family: 'JetBrains Mono', monospace; outline: none; transition: border-color .2s;
    }
    .key-input:focus { border-color: rgba(99,102,241,0.5); }
    .key-input::placeholder { color: #374151; }
    .btn-indigo {
      background: rgba(99,102,241,0.15); border: 1px solid rgba(99,102,241,0.3); color: #818cf8;
      border-radius: 8px; padding: 10px 18px; font-size: 12px; cursor: pointer;
      font-family: 'JetBrains Mono', monospace; transition: all .2s; white-space: nowrap;
    }
    .btn-indigo:hover { background: rgba(99,102,241,0.28); }
    .btn-red {
      background: rgba(220,38,38,0.08); border: 1px solid rgba(220,38,38,0.2); color: #f87171;
      border-radius: 8px; padding: 10px 14px; font-size: 12px; cursor: pointer;
      font-family: 'JetBrains Mono', monospace; transition: all .2s;
    }
    .btn-red:hover { background: rgba(220,38,38,0.18); }
    .hint { margin-top: 10px; font-size: 11px; color: #4b5563; font-family: 'JetBrains Mono', monospace; line-height: 2; }
    .hint a { color: #818cf8; text-decoration: underline; }
    .chip {
      display: inline-block; background: rgba(34,197,94,0.12); color: #4ade80;
      border: 1px solid rgba(34,197,94,0.25); border-radius: 4px; padding: 1px 6px;
      font-size: 10px; margin-left: 4px; vertical-align: middle;
    }

    /* ── Search ── */
    .search-box {
      background: rgba(255,255,255,0.025); border: 1px solid rgba(245,158,11,0.2);
      border-radius: 12px; padding: 22px; margin-bottom: 22px;
    }
    .search-label { font-size: 12px; color: #f59e0b; letter-spacing: 2px; font-family: 'JetBrains Mono', monospace; margin-bottom: 12px; display: block; }
    .search-input {
      flex:1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px; padding: 14px 18px; color: #e8e0d0; font-size: 16px;
      font-family: 'Noto Serif SC', serif; outline: none; transition: border-color .2s;
    }
    .search-input:focus { border-color: rgba(245,158,11,0.5); }
    .search-input::placeholder { color: #4b5563; }
    .btn-red-main {
      background: linear-gradient(135deg, #dc2626, #b91c1c); color: white; border: none;
      border-radius: 8px; padding: 14px 26px; font-size: 15px; font-family: 'Noto Serif SC', serif;
      cursor: pointer; transition: all .2s; white-space: nowrap; font-weight: 600; letter-spacing: 1px;
    }
    .btn-red-main:hover:not(:disabled) { background: linear-gradient(135deg,#ef4444,#dc2626); transform: translateY(-1px); box-shadow: 0 4px 20px rgba(220,38,38,.3); }
    .btn-red-main:disabled { opacity: .5; cursor: not-allowed; transform: none; }
    .tags-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; align-items: center; }
    .tag-lbl { font-size: 11px; color: #4b5563; font-family: 'JetBrains Mono', monospace; }
    .stock-tag {
      background: rgba(245,158,11,0.08); border: 1px solid rgba(245,158,11,0.2); color: #f59e0b;
      padding: 4px 12px; border-radius: 20px; font-size: 12px; cursor: pointer;
      transition: all .2s; font-family: 'JetBrains Mono', monospace;
    }
    .stock-tag:hover { background: rgba(245,158,11,0.18); border-color: rgba(245,158,11,0.5); }

    /* ── Loading ── */
    .loading-panel { background: rgba(255,255,255,0.02); border: 1px solid rgba(245,158,11,0.12); border-radius: 12px; padding: 44px; text-align: center; }
    .spinner { width: 46px; height: 46px; border: 2px solid rgba(245,158,11,0.15); border-top-color: #f59e0b; border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 18px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .progress-text { color: #f59e0b; font-family: 'JetBrains Mono', monospace; font-size: 13px; letter-spacing: 1px; }
    .steps { margin-top: 14px; display: flex; flex-direction: column; gap: 5px; align-items: center; }
    .step { font-size: 11px; font-family: 'JetBrains Mono', monospace; color: #2d3748; transition: color .3s; }
    .step.active { color: #f59e0b; }
    .step.done { color: #4ade80; }

    /* ── Report ── */
    .report-panel { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.07); border-radius: 12px; overflow: hidden; animation: fadeIn .5s ease; margin-bottom: 0; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    .report-header {
      background: linear-gradient(135deg,rgba(220,38,38,.12),rgba(185,28,28,.08));
      border-bottom: 1px solid rgba(220,38,38,.2); padding: 14px 22px;
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px;
    }
    .report-title { font-size: 12px; color: #dc2626; font-family: 'JetBrains Mono', monospace; letter-spacing: 2px; }
    .report-meta { display: flex; align-items: center; gap: 10px; }
    .report-date { font-size: 11px; color: #4b5563; font-family: 'JetBrains Mono', monospace; }
    .copy-btn {
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); color: #9ca3af;
      border-radius: 6px; padding: 4px 12px; font-size: 11px; cursor: pointer;
      font-family: 'JetBrains Mono', monospace; transition: all .2s;
    }
    .copy-btn:hover { background: rgba(255,255,255,0.1); color: #e8e0d0; }
    .report-body { padding: 26px 30px; line-height: 1.95; }
    .rline { margin-bottom: 6px; color: #d1c9bb; font-size: 15px; }
    .rtitle { font-size: 17px; color: #f59e0b; margin: 26px 0 12px; padding-bottom: 6px; border-bottom: 1px solid rgba(245,158,11,0.18); font-weight: 600; }
    .rtitle2 { font-size: 15px; color: #fbbf24; margin: 16px 0 8px; font-weight: 600; }
    .ritem { margin: 5px 0 5px 18px; color: #d1c9bb; font-size: 14px; list-style: none; padding-left: 12px; border-left: 2px solid rgba(245,158,11,0.28); line-height: 1.7; }
    strong { color: #fcd34d; font-weight: 600; }

    /* ── Chat ── */
    .chat-panel {
      background: rgba(255,255,255,0.015); border: 1px solid rgba(255,255,255,0.07);
      border-top: none; border-radius: 0 0 12px 12px; overflow: hidden;
    }
    .chat-divider {
      display: flex; align-items: center; gap: 12px; padding: 14px 22px;
      background: rgba(99,102,241,0.06); border-top: 1px solid rgba(99,102,241,0.15);
      border-bottom: 1px solid rgba(99,102,241,0.1);
    }
    .chat-divider-icon { font-size: 16px; }
    .chat-divider-text { font-size: 12px; color: #818cf8; font-family: 'JetBrains Mono', monospace; letter-spacing: 1px; }
    .chat-divider-sub { font-size: 11px; color: #374151; font-family: 'JetBrains Mono', monospace; margin-left: auto; }

    .chat-messages { padding: 16px 22px; display: flex; flex-direction: column; gap: 14px; max-height: 600px; overflow-y: auto; }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

    .msg { display: flex; gap: 10px; animation: msgIn .3s ease; }
    @keyframes msgIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
    .msg-user { flex-direction: row-reverse; }
    .msg-avatar {
      width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 13px;
    }
    .avatar-ai { background: linear-gradient(135deg,#4f46e5,#6366f1); }
    .avatar-user { background: linear-gradient(135deg,#dc2626,#b91c1c); }
    .msg-bubble {
      max-width: 82%; padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.8;
    }
    .bubble-ai { background: rgba(99,102,241,0.08); border: 1px solid rgba(99,102,241,0.15); color: #d1c9bb; border-radius: 4px 12px 12px 12px; }
    .bubble-user { background: rgba(220,38,38,0.1); border: 1px solid rgba(220,38,38,0.2); color: #e8d4d4; border-radius: 12px 4px 12px 12px; }
    .bubble-ai strong { color: #a5b4fc; }
    .bubble-ai .ritem { border-left-color: rgba(99,102,241,0.4); color: #c4bdf5; }

    .chat-typing {
      display: flex; align-items: center; gap: 5px; padding: 4px 0;
    }
    .typing-dot { width: 6px; height: 6px; border-radius: 50%; background: #818cf8; animation: typing 1.2s infinite; }
    .typing-dot:nth-child(2) { animation-delay: .2s; }
    .typing-dot:nth-child(3) { animation-delay: .4s; }
    @keyframes typing { 0%,60%,100%{opacity:.3;transform:scale(.8)} 30%{opacity:1;transform:scale(1)} }

    .chat-input-area {
      padding: 14px 22px 18px;
      border-top: 1px solid rgba(255,255,255,0.06);
      background: rgba(0,0,0,0.15);
    }
    .quick-questions { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 12px; }
    .quick-q {
      background: rgba(99,102,241,0.08); border: 1px solid rgba(99,102,241,0.2); color: #818cf8;
      padding: 5px 12px; border-radius: 16px; font-size: 12px; cursor: pointer;
      transition: all .2s; font-family: 'JetBrains Mono', monospace;
    }
    .quick-q:hover { background: rgba(99,102,241,0.18); }
    .chat-input-row { display: flex; gap: 10px; }
    .chat-input {
      flex:1; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px; padding: 12px 16px; color: #e8e0d0; font-size: 14px;
      font-family: 'Noto Serif SC', serif; outline: none; transition: border-color .2s; resize: none; min-height: 44px;
    }
    .chat-input:focus { border-color: rgba(99,102,241,0.4); }
    .chat-input::placeholder { color: #374151; }
    .send-btn {
      background: linear-gradient(135deg,#4f46e5,#6366f1); color: white; border: none;
      border-radius: 8px; padding: 12px 20px; font-size: 14px; cursor: pointer;
      transition: all .2s; white-space: nowrap; font-family: 'Noto Serif SC', serif;
    }
    .send-btn:hover:not(:disabled) { opacity: .9; transform: translateY(-1px); }
    .send-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

    /* ── Error ── */
    .error-panel { background: rgba(220,38,38,0.04); border: 1px solid rgba(220,38,38,0.2); border-radius: 12px; padding: 22px; color: #f87171; font-family: 'JetBrains Mono', monospace; font-size: 13px; line-height: 1.9; }
    .error-tip { margin-top: 8px; color: #fbbf24; font-size: 12px; }
    .disclaimer { text-align: center; color: #1f2937; font-size: 11px; margin-top: 22px; font-family: 'JetBrains Mono', monospace; }

    @media (max-width: 600px) {
      .row, .chat-input-row { flex-direction: column; }
      .report-body { padding: 18px 14px; }
      .chat-messages { padding: 12px 14px; }
      .chat-input-area { padding: 12px 14px 16px; }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect } = React;

const STORAGE_KEY = "ashare_ds_key";
const HISTORY_KEY = "ashare_history";
const DEFAULT_STOCKS = ["长飞光纤","宁德时代","中芯国际","贵州茅台","比亚迪"];
const ANALYZE_STEPS = ["读取股票基本信息…","分析主营产品价格…","评估行业价格走势…","综合基本面数据…","生成完整分析报告…"];

const QUICK_QUESTIONS = [
  "最近3个月产品价格走势如何？",
  "和竞争对手相比优势在哪里？",
  "现在买入的主要风险是什么？",
  "行业景气度目前处于什么阶段？",
  "机构持仓情况如何？",
  "下一个催化剂是什么？",
];

function renderMd(text, bubbleClass = "") {
  return text.split("\n").map((line, i) => {
    if (/^#{1,2} /.test(line)) return <h2 key={i} className="rtitle">{line.replace(/^#{1,2} /,"")}</h2>;
    if (/^###/.test(line))     return <h3 key={i} className="rtitle2">{line.replace(/^###+ /,"")}</h3>;
    if (/\*\*/.test(line)) {
      const parts = line.split("**");
      return <p key={i} className="rline" style={bubbleClass?{marginBottom:"4px"}:{}}>{parts.map((p,j)=>j%2===1?<strong key={j}>{p}</strong>:p)}</p>;
    }
    if (/^[-•*]\s/.test(line)||/^\d+\.\s/.test(line))
      return <li key={i} className="ritem">{line.replace(/^[-•*\d.]+\s/,"")}</li>;
    if (line.trim()==="") return <br key={i}/>;
    return <p key={i} className="rline" style={bubbleClass?{marginBottom:"4px"}:{}}>{line}</p>;
  });
}

function App() {
  // API key state
  const [apiKey,    setApiKey]    = useState(()=>localStorage.getItem(STORAGE_KEY)||"");
  const [keyInput,  setKeyInput]  = useState("");
  const [keySet,    setKeySet]    = useState(()=>!!localStorage.getItem(STORAGE_KEY));
  const [showInput, setShowInput] = useState(!localStorage.getItem(STORAGE_KEY));

  // Search state
  const [input,     setInput]     = useState("");
  const [history,   setHistory]   = useState(()=>{
    try { return JSON.parse(localStorage.getItem(HISTORY_KEY))||DEFAULT_STOCKS; }
    catch { return DEFAULT_STOCKS; }
  });

  // Analysis state
  const [loading,   setLoading]   = useState(false);
  const [stepIdx,   setStepIdx]   = useState(-1);
  const [report,    setReport]    = useState(null);
  const [reportFor, setReportFor] = useState("");
  const [error,     setError]     = useState(null);
  const [copied,    setCopied]    = useState(false);

  // Chat state
  const [chatHistory,  setChatHistory]  = useState([]); // [{role,content}]
  const [chatMessages, setChatMessages] = useState([]); // UI messages [{from,text}]
  const [chatInput,    setChatInput]    = useState("");
  const [chatLoading,  setChatLoading]  = useState(false);
  const [chatError,    setChatError]    = useState(null);

  const chatEndRef  = useRef(null);
  const chatInputRef = useRef(null);

  useEffect(() => {
    chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
  }, [chatMessages, chatLoading]);

  const saveKey = () => {
    const k = keyInput.trim();
    if (!k) { alert("请输入 DeepSeek API Key"); return; }
    localStorage.setItem(STORAGE_KEY, k);
    setApiKey(k); setKeySet(true); setShowInput(false); setKeyInput("");
  };
  const clearKey = () => {
    localStorage.removeItem(STORAGE_KEY);
    setApiKey(""); setKeySet(false); setShowInput(true);
  };

  const analyze = async (name) => {
    name = (name || input).trim();
    if (!name) return;
    if (!apiKey) { setShowInput(true); return; }

    setLoading(true); setReport(null); setError(null);
    setReportFor(name); setStepIdx(0);
    setChatHistory([]); setChatMessages([]); setChatError(null);

    const timers = ANALYZE_STEPS.map((_,i)=>setTimeout(()=>setStepIdx(i), i*1400));
    try {
      const res = await fetch("/api/analyze", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ stock: name, apiKey })
      });
      timers.forEach(clearTimeout);
      const data = await res.json();
      if (!res.ok) throw new Error(data?.error || `请求失败 (${res.status})`);
      if (!data.result) throw new Error("未获取到有效回复");

      setStepIdx(ANALYZE_STEPS.length);
      setReport(data.result);

      // Seed chat history with the report so follow-ups are contextual
      setChatHistory([
        { role: "assistant", content: data.result }
      ]);

      const h = [name, ...history.filter(x=>x!==name)].slice(0,8);
      setHistory(h);
      localStorage.setItem(HISTORY_KEY, JSON.stringify(h));
    } catch(e) {
      timers.forEach(clearTimeout);
      setError(e.message);
    } finally {
      setLoading(false);
    }
  };

  const sendChat = async (question) => {
    question = (question || chatInput).trim();
    if (!question || chatLoading) return;
    setChatInput(""); setChatError(null);

    // Add user message to UI
    setChatMessages(prev => [...prev, { from: "user", text: question }]);

    setChatLoading(true);
    try {
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          apiKey,
          stock: reportFor,
          history: chatHistory,
          question
        })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data?.error || `请求失败 (${res.status})`);
      if (!data.result) throw new Error("未获取到回复");

      // Add AI reply to UI
      setChatMessages(prev => [...prev, { from: "ai", text: data.result }]);

      // Update history for next round
      setChatHistory(prev => [
        ...prev,
        { role: "user", content: question },
        { role: "assistant", content: data.result }
      ]);
    } catch(e) {
      setChatError(e.message);
      setChatMessages(prev => [...prev, { from: "ai", text: `⚠ 错误：${e.message}` }]);
    } finally {
      setChatLoading(false);
      setTimeout(() => chatInputRef.current?.focus(), 100);
    }
  };

  const copy = () => {
    if (!report) return;
    navigator.clipboard.writeText(report).then(()=>{ setCopied(true); setTimeout(()=>setCopied(false),2000); });
  };

  return (
    <div className="app">
      <div className="header">
        <div className="logo-badge"><span className="ds-dot"/> DEEPSEEK · A股分析</div>
        <h1 className="title">A股智能分析系统</h1>
        <p className="subtitle">产品价格追踪 · 行业景气分析 · AI对话研究</p>
        <span className="powered">Powered by <span>DeepSeek-V3</span> · 参考慧博投资分析平台 · Wind · 东方财富</span>
      </div>

      <div className="main-card">

        {/* API Key */}
        <div className="apikey-panel">
          <div className="apikey-header">
            <span className="apikey-label">DEEPSEEK API KEY</span>
            <span className={`badge ${keySet?"badge-ok":"badge-no"}`}>{keySet?"✓ 已配置":"未配置"}</span>
          </div>
          {showInput ? (
            <>
              <div className="row">
                <input className="key-input" type="password" placeholder="sk-..."
                  value={keyInput} onChange={e=>setKeyInput(e.target.value)}
                  onKeyDown={e=>e.key==="Enter"&&saveKey()} />
                <button className="btn-indigo" onClick={saveKey}>保存</button>
                {keySet && <button className="btn-red" onClick={()=>setShowInput(false)}>取消</button>}
              </div>
              <div className="hint">
                获取 Key：<a href="https://platform.deepseek.com/api_keys" target="_blank">platform.deepseek.com</a>
                <span className="chip">极便宜</span><br/>
                支付宝充值 · ¥10 可用数月 · Key 仅保存在本地浏览器
              </div>
            </>
          ) : (
            <div style={{display:"flex",gap:"10px"}}>
              <button className="btn-indigo" onClick={()=>setShowInput(true)}>修改 Key</button>
              <button className="btn-red" onClick={clearKey}>清除</button>
            </div>
          )}
        </div>

        {/* Search */}
        <div className="search-box">
          <label className="search-label">INPUT STOCK · 输入股票名称或代码</label>
          <div className="row">
            <input className="search-input" placeholder="如：长飞光纤、宁德时代、688516…"
              value={input} onChange={e=>setInput(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&analyze()} disabled={loading} />
            <button className="btn-red-main" onClick={()=>analyze()} disabled={loading||!input.trim()}>
              {loading?"分析中…":"开始分析"}
            </button>
          </div>
          <div className="tags-row">
            <span className="tag-lbl">历史：</span>
            {history.map(s=>(
              <button key={s} className="stock-tag" onClick={()=>{setInput(s);analyze(s);}}>{s}</button>
            ))}
          </div>
        </div>

        {/* Loading */}
        {loading && (
          <div className="loading-panel">
            <div className="spinner"/>
            <div className="progress-text">DeepSeek 正在深度分析中…</div>
            <div className="steps">
              {ANALYZE_STEPS.map((s,i)=>(
                <div key={i} className={`step ${i<stepIdx?"done":i===stepIdx?"active":""}`}>
                  {i<stepIdx?"✓ ":i===stepIdx?"▶ ":"  "}{s}
                </div>
              ))}
            </div>
          </div>
        )}

        {/* Error */}
        {error && !loading && (
          <div className="error-panel">
            <div style={{fontSize:"15px",marginBottom:"8px"}}>⚠ 请求失败</div>
            <div>{error}</div>
            {(error.includes("401")||error.includes("Unauthorized"))&&<div className="error-tip">→ API Key 不正确，请重新填写</div>}
            {(error.includes("402")||error.includes("balance")||error.includes("insufficient"))&&<div className="error-tip">→ 余额不足，请前往 platform.deepseek.com 充值（支付宝）</div>}
            {error.includes("429")&&<div className="error-tip">→ 请求太频繁，稍等几秒重试</div>}
          </div>
        )}

        {/* Report + Chat (combined card) */}
        {report && !loading && (
          <>
            <div className="report-panel">
              <div className="report-header">
                <span className="report-title">INVESTMENT REPORT · {reportFor} 投资分析报告</span>
                <div className="report-meta">
                  <span className="report-date">{new Date().toLocaleDateString("zh-CN")} 生成</span>
                  <button className="copy-btn" onClick={copy}>{copied?"✓ 已复制":"复制报告"}</button>
                </div>
              </div>
              <div className="report-body">{renderMd(report)}</div>
            </div>

            {/* Chat Section */}
            <div className="chat-panel">
              <div className="chat-divider">
                <span className="chat-divider-icon">💬</span>
                <span className="chat-divider-text">继续追问 · AI 对话分析</span>
                <span className="chat-divider-sub">基于以上报告，您可以继续深入提问</span>
              </div>

              {/* Messages */}
              {chatMessages.length > 0 && (
                <div className="chat-messages">
                  {chatMessages.map((m,i)=>(
                    <div key={i} className={`msg ${m.from==="user"?"msg-user":""}`}>
                      <div className={`msg-avatar ${m.from==="ai"?"avatar-ai":"avatar-user"}`}>
                        {m.from==="ai"?"🤖":"👤"}
                      </div>
                      <div className={`msg-bubble ${m.from==="ai"?"bubble-ai":"bubble-user"}`}>
                        {m.from==="ai" ? renderMd(m.text,"bubble") : m.text}
                      </div>
                    </div>
                  ))}
                  {chatLoading && (
                    <div className="msg">
                      <div className="msg-avatar avatar-ai">🤖</div>
                      <div className="msg-bubble bubble-ai">
                        <div className="chat-typing">
                          <div className="typing-dot"/><div className="typing-dot"/><div className="typing-dot"/>
                        </div>
                      </div>
                    </div>
                  )}
                  <div ref={chatEndRef}/>
                </div>
              )}

              {/* Input Area */}
              <div className="chat-input-area">
                <div className="quick-questions">
                  {QUICK_QUESTIONS.map(q=>(
                    <button key={q} className="quick-q" onClick={()=>sendChat(q)} disabled={chatLoading}>
                      {q}
                    </button>
                  ))}
                </div>
                <div className="chat-input-row">
                  <textarea
                    ref={chatInputRef}
                    className="chat-input"
                    placeholder={`针对 ${reportFor} 继续提问，如：近期有哪些重要催化剂？`}
                    value={chatInput}
                    onChange={e=>setChatInput(e.target.value)}
                    onKeyDown={e=>{ if(e.key==="Enter"&&!e.shiftKey){ e.preventDefault(); sendChat(); } }}
                    disabled={chatLoading}
                    rows={1}
                  />
                  <button className="send-btn" onClick={()=>sendChat()} disabled={chatLoading||!chatInput.trim()}>
                    {chatLoading?"回复中…":"发送"}
                  </button>
                </div>
              </div>
            </div>
          </>
        )}

        <p className="disclaimer">⚠ 本报告及对话内容由 AI 生成，仅供参考，不构成投资建议。投资有风险，入市需谨慎。</p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
